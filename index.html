<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu App de RA</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; }
        model-viewer { width: 100vw; height: 100vh; background-color: #f0f0f0; }
        #ar-button {
            background-color: white; border-radius: 8px; border: 1px solid #ccc;
            padding: 10px; position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
        }
    </style>
</head>
<body>

    <model-viewer 
        src="./models/pixellabs-robot-3332.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1">
        
        <button slot="ar-button" id="ar-button">
            👋 VER NO MEU AMBIENTE
        </button>
    </model-viewer>

</body>
</html>
